services:
  # PostgreSQL Database
  - type: pserv
    name: homecrew-db
    env: python
    plan: free
    region: oregon
    databases:
      - name: homecrew_db
        databaseName: homecrew
        user: homecrew_user

  # Django Backend
  - type: web
    name: homecrew-backend
    env: python
    region: oregon
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn house_hold_service.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: homecrew-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: SSLCOMMERZ_STORE_ID
        sync: false
      - key: SSLCOMMERZ_STORE_PASSWORD
        sync: false
      - key: SSLCOMMERZ_IS_SANDBOX
        value: True
      - key: BACKEND_URL
        sync: false
      - key: FRONTEND_PROTOCOL
        value: https
      - key: FRONTEND_DOMAIN
        sync: false

  # React Frontend
  - type: web
    name: homecrew-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: cd homecrew-client && npm install && npm run build
    staticPublishPath: ./homecrew-client/dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
