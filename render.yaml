# Render Blueprint for HomeCrew Application
# Note: This is a simplified blueprint. Some configurations need to be done manually in Render Dashboard.

databases:
  - name: homecrew-db
    databaseName: homecrew
    user: homecrew_user
    plan: free
    region: oregon

services:
  # Django Backend Web Service
  - type: web
    name: homecrew-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn house_hold_service.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: homecrew-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: SSLCOMMERZ_STORE_ID
        sync: false
      - key: SSLCOMMERZ_STORE_PASSWORD
        sync: false
      - key: SSLCOMMERZ_IS_SANDBOX
        value: "True"
      - key: BACKEND_URL
        sync: false
      - key: FRONTEND_PROTOCOL
        value: "https"
      - key: FRONTEND_DOMAIN
        value: "home-crew-a-smart-household-service-hv7v.onrender.com"

  # React Frontend Static Site
  - type: web
    name: homecrew-frontend
    runtime: static
    plan: free
    rootDir: homecrew-client
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://home-crew-a-smart-household-service-b93r.onrender.com/api/v1"
    pullRequestPreviewsEnabled: false


